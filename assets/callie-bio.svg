<svg width="850" height="612" viewBox="0 0 850 612" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1e0d24"/>
      <stop offset="100%" stop-color="#0e1e20"/>
    </linearGradient>
    <style>
      @keyframes spkB{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:.9;transform:scale(1)}}
      @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
      .spB{animation:spkB 3s ease-in-out infinite}
      .f0{animation:fu .8s ease-out 0s    both}
      .f1{animation:fu .8s ease-out .2s   both}
      .f2{animation:fu .8s ease-out .45s  both}
      .f3{animation:fu .8s ease-out .65s  both}
      .f4{animation:fu .8s ease-out .85s  both}
    </style>
  </defs>

  <!-- Background & border -->
  <rect width="850" height="612" fill="url(#bBg)" rx="8"/>
  <rect x="1" y="1" width="848" height="610" fill="none" stroke="#4dbfff" stroke-width="1" rx="8" opacity=".28"/>
  
  <path d="M10,42 L10,10 L42,10" fill="none" stroke="#f5921e" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
  <path d="M840,42 L840,10 L808,10" fill="none" stroke="#f5921e" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
  <path d="M10,570 L10,602 L42,602" fill="none" stroke="#d478b0" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
  <path d="M840,570 L840,602 L808,602" fill="none" stroke="#d478b0" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>

  <!-- Sparkle decorations -->
  <text x="820" y="140" font-size="10" fill="#f5921e" class="spB" style="animation-delay:0s">✦</text>
  <text x="826" y="260" font-size="7"  fill="#d478b0"      class="spB" style="animation-delay:1.2s">✦</text>
  <text x="824" y="420" font-size="8"  fill="#5DCAA5"        class="spB" style="animation-delay:0.7s">✦</text>

  <!-- LORE header -->
  <text x="36" y="38" font-family="'Georgia',serif" font-size="12" fill="#4dbfff" letter-spacing="4" opacity=".95" class="f0">✦ LORE</text>
  <line x1="90" y1="46" x2="814" y2="46" stroke="#4dbfff" stroke-width=".5" opacity=".18"/>

  <!-- Quote -->
  <text x="36" y="68" font-family="'Georgia',serif" font-size="17" font-style="italic" fill="#f0d4e8" opacity=".95" class="f1">The gap between working and feeling good to use — that's where I live.</text>
  <line x1="36" y1="82" x2="814" y2="82" stroke="rgba(255,255,255,0.14)" stroke-width=".7" opacity=".8"/>

  <!-- Left column body text -->
  <g class="f2">
  <text x="36" y="100" font-family="'Georgia',serif" font-size="13" fill="#e8e8f0">Users don't file bug reports when something feels off — they</text>
  <text x="36" y="120" font-family="'Georgia',serif" font-size="13" fill="#e8e8f0">just quietly give up. I got tired of watching that happen.</text>
  <text x="36" y="140" font-family="'Georgia',serif" font-size="13" fill="#e8e8f0">After years building in the React and TypeScript ecosystem,</text>
  <text x="36" y="160" font-family="'Georgia',serif" font-size="13" fill="#e8e8f0">I started paying attention to the moments before the complaints:</text>
  <text x="36" y="180" font-family="'Georgia',serif" font-size="13" fill="#e8e8f0">the hesitation, the retry, the silent confusion.</text>
  <text x="36" y="214" font-family="'Georgia',serif" font-size="13" fill="#e8e8f0">That's what I fix. Not just the obvious breaks, but the subtle</text>
  <text x="36" y="234" font-family="'Georgia',serif" font-size="13" fill="#e8e8f0">friction that makes people feel like the tool is working against</text>
  <text x="36" y="254" font-family="'Georgia',serif" font-size="13" fill="#e8e8f0">them. Whether it's an AI feature that fails without explanation,</text>
  <text x="36" y="274" font-family="'Georgia',serif" font-size="13" fill="#e8e8f0">a component that's technically accessible but practically unusable,</text>
  <text x="36" y="294" font-family="'Georgia',serif" font-size="13" fill="#e8e8f0">or a design system that falls apart the moment a second designer</text>
  <text x="36" y="314" font-family="'Georgia',serif" font-size="13" fill="#e8e8f0">touches it.</text>
  <text x="36" y="348" font-family="'Georgia',serif" font-size="13" fill="#e8e8f0">I care about the handoff between what ships and what people</text>
  <text x="36" y="368" font-family="'Georgia',serif" font-size="13" fill="#e8e8f0">actually experience. That gap is where I do my best work.</text>
  </g>

  <!-- Skills grid separator -->
  <line x1="36" y1="402" x2="530" y2="402" stroke="rgba(255,255,255,0.14)" stroke-width=".7" opacity=".8" class="f3"/>
  <g class="f3">
  
  <rect x="36" y="416" width="243" height="68" rx="5" fill="#0e1220" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
  <rect x="36" y="416" width="243" height="3" rx="2" fill="#f5921e" opacity=".85"/>
  <text x="48" y="437" font-family="'Courier New',monospace" font-size="12" fill="#d4c0e8">Accessibility</text>
  <text x="48" y="455" font-family="'Georgia',serif" font-size="11" fill="#96a0c0">baked in at architecture time, not</text>
  <text x="48" y="469" font-family="'Georgia',serif" font-size="11" fill="#96a0c0">patched in at review</text>
  <rect x="287" y="416" width="243" height="68" rx="5" fill="#0e1220" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
  <rect x="287" y="416" width="243" height="3" rx="2" fill="#d478b0" opacity=".85"/>
  <text x="299" y="437" font-family="'Courier New',monospace" font-size="12" fill="#d4c0e8">Performance</text>
  <text x="299" y="455" font-family="'Georgia',serif" font-size="11" fill="#96a0c0">where it affects users, not just</text>
  <text x="299" y="469" font-family="'Georgia',serif" font-size="11" fill="#96a0c0">Lighthouse scores</text>
  <rect x="36" y="492" width="243" height="68" rx="5" fill="#0e1220" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
  <rect x="36" y="492" width="243" height="3" rx="2" fill="#4dbfff" opacity=".85"/>
  <text x="48" y="513" font-family="'Courier New',monospace" font-size="12" fill="#d4c0e8">Design Systems</text>
  <text x="48" y="531" font-family="'Georgia',serif" font-size="11" fill="#96a0c0">coherent after two years and five</text>
  <text x="48" y="545" font-family="'Georgia',serif" font-size="11" fill="#96a0c0">designers</text>
  <rect x="287" y="492" width="243" height="68" rx="5" fill="#0e1220" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
  <rect x="287" y="492" width="243" height="3" rx="2" fill="#f0b8d0" opacity=".85"/>
  <text x="299" y="513" font-family="'Courier New',monospace" font-size="12" fill="#d4c0e8">AI/UX</text>
  <text x="299" y="531" font-family="'Georgia',serif" font-size="11" fill="#96a0c0">interfaces that degrade gracefully</text>
  <text x="299" y="545" font-family="'Georgia',serif" font-size="11" fill="#96a0c0">when the model is wrong</text>
  </g>

  <!-- Terminal card -->
  <g class="f3">
  <rect x="546" y="100" width="268" height="158" rx="7" fill="#0d1117" stroke="#5DCAA5" stroke-opacity="0.30" stroke-width="1"/>
  <rect x="546" y="100" width="268" height="26" rx="7" fill="#161b27"/>
  <rect x="546" y="120" width="268" height="6" fill="#161b27"/>
  <line x1="546" y1="126" x2="814" y2="126" stroke="#5DCAA5" stroke-opacity="0.15" stroke-width=".5"/>
  <circle cx="560" cy="113" r="4.5" fill="#FF5F56"/>
  <circle cx="573" cy="113" r="4.5" fill="#FFBD2E"/>
  <circle cx="586" cy="113" r="4.5" fill="#27C93F"/>
  <text x="680" y="118" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="rgba(255,255,255,0.70)">callie@dev ~</text>
  
  <text x="562" y="142" font-family="'Courier New',monospace" font-size="12" fill="#5DCAA5">›</text>
  <text x="575" y="142" font-family="'Courier New',monospace" font-size="12" fill="rgba(255,255,255,0.92)">npm run build:ds --coverage</text>
  <text x="562" y="159" font-family="'Courier New',monospace" font-size="12" fill="#5DCAA5">✓</text>
  <text x="575" y="159" font-family="'Courier New',monospace" font-size="12" fill="rgba(255,255,255,0.82)"> components compiled (48)</text>
  <text x="562" y="176" font-family="'Courier New',monospace" font-size="12" fill="#5DCAA5">✓</text>
  <text x="575" y="176" font-family="'Courier New',monospace" font-size="12" fill="rgba(255,255,255,0.82)"> a11y: 0 violations</text>
  <text x="562" y="193" font-family="'Courier New',monospace" font-size="12" fill="#5DCAA5">✓</text>
  <text x="575" y="193" font-family="'Courier New',monospace" font-size="12" fill="rgba(255,255,255,0.82)"> coverage 94% (+54% vs baseline)</text>
  <text x="562" y="210" font-family="'Courier New',monospace" font-size="12" fill="#EF9F27">⚠</text>
  <text x="575" y="210" font-family="'Courier New',monospace" font-size="12" fill="rgba(255,255,255,0.82)"> Modal focus trap — needs review</text>
  <text x="562" y="227" font-family="'Courier New',monospace" font-size="12" fill="#5DCAA5">›</text>
  <rect x="575" y="217" width="7" height="12" rx=".5" fill="#5DCAA5">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
  </g>
</svg>