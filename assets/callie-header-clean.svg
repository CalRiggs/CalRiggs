    font-size="13" fill="rgba(255,255,255,0.90)" letter-spacing="6" opacity="1" class="f0">HI, I'M</text>
  <text x="428" y="138" text-anchor="middle" font-family="'Georgia','Times New Roman',serif"
    font-size="72" font-weight="bold" fill="#6b1e40" letter-spacing="6" opacity=".30">CALLIE</text>
