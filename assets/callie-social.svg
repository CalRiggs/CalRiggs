<svg width="850" height="120" viewBox="0 0 850 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1a0a1e"/>
      <stop offset="50%"  stop-color="#1e0d24"/>
      <stop offset="100%" stop-color="#0d0f1e"/>
    </linearGradient>
    <linearGradient id="ghBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1a1030"/>
      <stop offset="100%" stop-color="#0e1828"/>
    </linearGradient>
    <linearGradient id="liBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0e1a30"/>
      <stop offset="100%" stop-color="#081428"/>
    </linearGradient>
    <style>
      @keyframes sh2{0%,100%{opacity:.15}50%{opacity:.45}}
      @keyframes sp{0%,100%{opacity:.15;transform:scale(.7)}50%{opacity:.9;transform:scale(1)}}
      @keyframes pu{0%,100%{opacity:.7;transform:translateY(0)}50%{opacity:1;transform:translateY(-2px)}}
      .sh2{animation:sh2 4s ease-in-out infinite}
      .sp{animation:sp 3s ease-in-out infinite}
      .pu{animation:pu 3.5s ease-in-out infinite}
    </style>
  </defs>

  <!-- Background -->
  <rect width="850" height="120" fill="url(#sBg)" rx="8"/>

  <!-- Border -->
  <rect x="1" y="1" width="848" height="118" fill="none" stroke="#c4a0e8" stroke-width="1" rx="8" opacity=".28"/>

  <!-- Corner brackets -->
  <path d="M10,34 L10,10 L34,10" fill="none" stroke="#e8a4c8" stroke-width="1.5" stroke-linecap="round" opacity=".55"/>
  <path d="M840,34 L840,10 L816,10" fill="none" stroke="#e8a4c8" stroke-width="1.5" stroke-linecap="round" opacity=".55"/>
  <path d="M10,86 L10,110 L34,110" fill="none" stroke="#7ed4b8" stroke-width="1.5" stroke-linecap="round" opacity=".55"/>
  <path d="M840,86 L840,110 L816,110" fill="none" stroke="#7ed4b8" stroke-width="1.5" stroke-linecap="round" opacity=".55"/>

  <!-- Section header -->
  <text x="425" y="28" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#c4a0e8" letter-spacing="4" opacity=".9">✦  LET'S CONNECT  ✦</text>
  <line x1="120" y1="34" x2="730" y2="34" stroke="#c4a0e8" stroke-width=".5" opacity=".15" class="sh2"/>

  <!-- GitHub badge — left of centre -->
  <g class="pu" style="animation-delay:0s; transform-origin:284px 74px">
    <rect x="164" y="44" width="240" height="54" rx="8" fill="url(#ghBg)" stroke="#e8a4c8" stroke-width="1" opacity=".85"/>
    <rect x="164" y="44" width="240" height="4" rx="4" fill="#e8a4c8" opacity=".6"/>
    <!-- GitHub icon -->
    <g transform="translate(188,58) scale(0.75)">
      <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z" fill="#e8a4c8" opacity=".9"/>
    </g>
    <text x="222" y="66" font-family="'Courier New',monospace" font-size="11" fill="#f0d4e8" font-weight="bold">Github</text>
    <text x="222" y="82" font-family="'Georgia',serif" font-size="10" fill="#c4a0e8" opacity=".9">/CalRiggs</text>
    <!-- Right arrow -->
    <text x="376" y="74" text-anchor="end" font-family="'Courier New',monospace" font-size="9" fill="#e8a4c8" opacity=".5">→</text>
  </g>

  <!-- LinkedIn badge — right of centre -->
  <g class="pu" style="animation-delay:0.8s; transform-origin:566px 74px">
    <rect x="446" y="44" width="240" height="54" rx="8" fill="url(#liBg)" stroke="#7ed4b8" stroke-width="1" opacity=".85"/>
    <rect x="446" y="44" width="240" height="4" rx="4" fill="#7ed4b8" opacity=".6"/>
    <!-- LinkedIn icon -->
    <g transform="translate(470,58) scale(0.75)">
      <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" fill="#7ed4b8" opacity=".9"/>
    </g>
    <text x="504" y="66" font-family="'Courier New',monospace" font-size="11" fill="#d4f0e8" font-weight="bold">Linkedin</text>
    <text x="504" y="82" font-family="'Georgia',serif" font-size="10" fill="#7ed4b8" opacity=".9">/in/callieriggs</text>
    <text x="658" y="74" text-anchor="end" font-family="'Courier New',monospace" font-size="9" fill="#7ed4b8" opacity=".5">→</text>
  </g>

  <!-- Sparkles -->
  <text x="52"  y="56"  font-size="8" fill="#e8a4c8" class="sp" style="animation-delay:0.3s">✦</text>
  <text x="790" y="56"  font-size="7" fill="#7ed4b8" class="sp" style="animation-delay:1.1s">✦</text>
  <text x="92"  y="90"  font-size="6" fill="#c4a0e8" class="sp" style="animation-delay:1.8s">✦</text>
  <text x="758" y="92"  font-size="7" fill="#e8a4c8" class="sp" style="animation-delay:0.6s">✦</text>

  <!-- Bottom shimmer -->
  <line x1="140" y1="108" x2="710" y2="108" stroke="#c4a0e8" stroke-width=".5" opacity=".08" class="sh2"/>
</svg>